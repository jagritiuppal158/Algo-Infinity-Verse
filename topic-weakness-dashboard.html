<body data-page="topic-weakness-dashboard">

    <div class="container">

        <h1>
            Topic Wise 
            <span>Performance Dashboard</span>
        </h1>

        <p class="subtitle">
            Analyze your DSA strengths and identify weak areas.
        </p>

        <div class="summary">

            <div class="box">
                <h3>Strong Topics</h3>
                <p id="strongCount">0</p>

            <div class="box">
                <h3>Average Topics</h3>
                <p id="averageCount">0</p>
            </div>

            <div class="box">
                <h3>Weak Topics</h3>
                <p id="weakCount">0</p>
            </div>

        </div>

        <h2>Topic Analysis</h2>

        <div id="topicContainer" class="topics"></div>

        <!-- ✅ ADD THIS SECTION -->

        <div id="recommendationList"></div>
