<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack & Queue Visualizer | Algo Infinity Verse</title>
  <meta name="description"
    content="Interactive Stack and Queue Visualizer to learn LIFO and FIFO operations through real-time animations." />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="stack-queue-visualizer.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/brands.min.css"
    integrity="sha512-W/zrbCncQnky/EzL+/AYwTtosvrM+YG/V6piQLSe2HuKS6cmbw89kjYkp3tWFn1dkWV7L1ruvJyKbLz73Vlgfg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>


<body data-page="stack-queue-visualizer">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader">
      <div class="infinity-loader">∞</div>
      <h2>Algo Infinity Verse</h2>
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
    </div>
  </div>

  <!-- Scroll to Top Button -->
  <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- Navigation Bar -->
  <div id="navbar-placeholder"></div>

<section class="hero">
  <div class="container">
    <div class="hero-content">
      <h1>Stack & Queue Visualizer</h1>
      <p>
        Learn LIFO and FIFO operations through interactive visualizations.
      </p>

      <div class="hero-buttons">
        <a href="#stack-section" class="btn btn-primary">Explore Stack</a>
        <a href="#queue-section" class="btn btn-secondary">Explore Queue</a>
      </div>
    </div>
  </div>
</section>

<section class="sqv-section">
  <div class="container sqv-container">

    <!-- Stack Visualizer -->
    <div class="sqv-card" id="stack-section">
      <h2>Stack Visualizer</h2>

      <div class="sqv-controls">
        <input
    type="number"
    id="stackInput"
    class="sqv-input"
    placeholder="Enter value"
/>

<button id="pushBtn" class="sqv-btn">Push</button>
<button id="popBtn" class="sqv-btn">Pop</button>
<button id="peekBtn" class="sqv-btn">Peek</button>
<button id="resetStackBtn" class="sqv-btn">Reset</button>
      </div>

      <h3 class="sqv-label">TOP</h3>

<div id="stackContainer" class="stack-column"></div>
<p id="stackMessage"></p>
    </div>

    <!-- Queue Visualizer -->
    <div class="sqv-card" id="queue-section">
      <h2>Queue Visualizer</h2>

      <div class="sqv-controls">
        <input
    type="number"
    id="queueInput"
    class="sqv-input"
    placeholder="Enter value"
/>

<button id="enqueueBtn" class="sqv-btn">Enqueue</button>
<button id="dequeueBtn" class="sqv-btn">Dequeue</button>
<button id="frontBtn" class="sqv-btn">Front</button>
<button id="resetQueueBtn" class="sqv-btn">Reset</button>
      </div>

      <div class="queue-labels">
  <span>Front</span>
  <span>Rear</span>
</div>

<div id="queueContainer" class="queue-row"></div>
<p id="queueMessage"></p>
    </div>

    <!-- History -->
    <div class="sqv-card" id="history-section">
    <h2>Operation History</h2>
      <ul id="historyList"></ul>
    </div>

  </div>
</section>

<!-- Footer -->
  <div id="footer-placeholder"></div>

  <script>
    // FIX: script.js's DOMContentLoaded handler calls initDarkMode(), but that
    // function is never defined anywhere in script.js. Since it's undefined,
    // calling it throws a ReferenceError that can halt the rest of that handler
    // (navbar/hero/etc. init calls that follow it never run). Defining it here,
    // before script.js loads, makes that call succeed harmlessly everywhere,
    // and gives this page working dark/light mode without touching script.js.
    if (typeof window.initDarkMode !== "function") {
      window.initDarkMode = function () {
        const toggleBtn = document.getElementById("darkModeToggle");
        if (!toggleBtn || toggleBtn.dataset.darkModeBound === "true") return;
        toggleBtn.dataset.darkModeBound = "true";

        const STORAGE_KEY = "algoInfinityVerse-theme"; // 'light' | 'dark'
        const icon = toggleBtn.querySelector("i");

        function applyTheme(theme) {
          const isLight = theme === "light";
          document.body.classList.toggle("light-mode", isLight);
          if (icon) {
            icon.classList.toggle("fa-sun", isLight);
            icon.classList.toggle("fa-moon", !isLight);
          }
          toggleBtn.setAttribute(
            "aria-label",
            isLight ? "Switch to dark mode" : "Switch to light mode"
          );
        }

        let savedTheme = null;
        try {
          savedTheme = localStorage.getItem(STORAGE_KEY);
        } catch (e) {}

        let initialTheme = savedTheme;
        if (!initialTheme) {
          const prefersLight =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          initialTheme = prefersLight ? "light" : "dark";
        }
        applyTheme(initialTheme);

        toggleBtn.addEventListener("click", () => {
          const isCurrentlyLight = document.body.classList.contains("light-mode");
          const nextTheme = isCurrentlyLight ? "dark" : "light";
          applyTheme(nextTheme);
          try {
            localStorage.setItem(STORAGE_KEY, nextTheme);
          } catch (e) {
            console.warn("Could not persist theme preference:", e);
          }
        });
      };
    }

    // BACKUP: in case script.js's init sequence errors out before reaching
    // initDarkMode() at all (e.g. an unrelated earlier failure), bind it
    // directly here too. The dataset guard above prevents double-binding.
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof window.initDarkMode === "function") {
        window.initDarkMode();
      }
    });
  </script>
  <script src="./auth.js"></script>
  <script src="./script.js"></script>
  <script src="stack-queue-visualizer.js"></script>


  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
</body>
</html>
