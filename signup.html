<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Algo Infinity Verse</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body data-page="signup">
    <div id="navbar-placeholder"></div>

    <main class="auth-page">
      <section class="auth-panel glass-card">
        <div class="auth-brand">
          <span class="auth-mark">∞</span>
          <h1>Create Account</h1>
          <p>
            Save progress, join discussions, and keep learning across sessions.
          </p>
        </div>

        <form class="auth-form" data-auth-form="signup" novalidate>
          <div class="form-group">
            <label for="name">Name</label>
            <input
              id="name"
              name="name"
              type="text"
              autocomplete="name"
              minlength="2"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
            <div class="password-meter" data-password-strength data-score="0">
              <span></span>
            </div>
            <small
              >Use at least 8 characters with uppercase, lowercase, and a
              number.</small
            >
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
          </div>
          <p class="auth-message" data-auth-message aria-live="polite"></p>
          <button class="btn btn-primary auth-submit" type="submit">
            <i class="fas fa-user-plus"></i>
            <span>Sign Up</span>
          </button>
        </form>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Log in</a>
        </p>
      </section>
    </main>

    <script src="auth.js"></script>
    <script>
      const menuToggle = document.getElementById("menuToggle");
      const navLinks = document.getElementById("navLinks");

      let overlay = document.querySelector(".nav-overlay");
      if (!overlay && menuToggle && navLinks) {
        overlay = document.createElement("div");
        overlay.className = "nav-overlay";
        document.body.appendChild(overlay);
      }

      const toggleMenu = (open) => {
        const isOpen =
          open !== undefined ? open : !navLinks.classList.contains("active");
        navLinks.classList.toggle("active", isOpen);
        menuToggle.setAttribute("aria-expanded", isOpen);
        if (overlay) overlay.classList.toggle("active", isOpen);
        document.body.style.overflow = isOpen ? "hidden" : "";
        const icon = menuToggle.querySelector("i");
        if (icon) {
          icon.classList.toggle("fa-bars", !isOpen);
          icon.classList.toggle("fa-times", isOpen);
        }
      };

      const closeMenu = () => {
        if (!navLinks.classList.contains("active")) return;
        toggleMenu(false);
      };

      if (menuToggle && navLinks) {
        menuToggle.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleMenu();
        });

        if (overlay) overlay.addEventListener("click", closeMenu);

        navLinks.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", closeMenu);
        });
      }
    </script>
  
  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
</body>
</html>
